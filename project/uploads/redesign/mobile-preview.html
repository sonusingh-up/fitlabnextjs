<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Mobile preview</title>
<style>
  body { margin: 0; background: #2a2a2a; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px; gap: 32px; flex-wrap: wrap; font-family: ui-monospace, monospace; color: #aaa; }
  .device { background: #f6f4ef; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border-radius: 20px; overflow: hidden; flex-shrink: 0; }
  .device-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 8px; text-align: center; }
  iframe { display: block; border: 0; background: #f6f4ef; }
  .ctl { color: #ddd; margin-bottom: 16px; text-align: center; width: 100%; }
  .ctl select { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 6px 12px; font-family: inherit; font-size: 12px; }
  .device.iphone { width: 390px; }
  .device.iphone iframe { width: 390px; height: 844px; }
  .device.android { width: 360px; }
  .device.android iframe { width: 360px; height: 800px; }
  .device.tablet { width: 768px; }
  .device.tablet iframe { width: 768px; height: 900px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<div class="ctl">
  <label>Page: 
    <select id="page-sel">
      <option value="index.html">Home</option>
      <option value="reviews.html">Reviews index</option>
      <option value="review.html">Single review</option>
      <option value="blog.html">Blog index</option>
      <option value="post.html">Blog post</option>
      <option value="research.html">Research index</option>
      <option value="study.html">Research study</option>
      <option value="best.html">Best of</option>
      <option value="methodology.html">Methodology</option>
      <option value="about.html">About</option>
    </select>
  </label>
</div>
<div class="col">
  <div class="device-label">iPhone 14 · 390 × 844</div>
  <div class="device iphone"><iframe id="if-iphone" src="index.html"></iframe></div>
</div>
<div class="col">
  <div class="device-label">Android · 360 × 800</div>
  <div class="device android"><iframe id="if-android" src="index.html"></iframe></div>
</div>
<div class="col">
  <div class="device-label">Tablet · 768 × 900</div>
  <div class="device tablet"><iframe id="if-tablet" src="index.html"></iframe></div>
</div>
<script>
  document.getElementById('page-sel').addEventListener('change', e => {
    ['if-iphone','if-android','if-tablet'].forEach(id => {
      document.getElementById(id).src = e.target.value;
    });
  });
</script>
</body>
</html>
